<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder — Ghost Operator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222;
    --accent: #c8ff00;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(200,255,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(200,255,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    position: relative;
    z-index: 1;
  }

  header {
    margin-bottom: 50px;
  }

  .tag {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(36px, 7vw, 72px);
    font-weight: 800;
    line-height: 0.95;
    color: var(--text);
  }

  h1 span {
    color: var(--accent);
    display: block;
  }

  .subtitle {
    margin-top: 16px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
  }

  /* Filters */
  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 30px;
  }

  .filter-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    width: 100%;
    margin-bottom: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,255,0,0.05);
  }

  /* Launch button */
  .launch-btn {
    width: 100%;
    padding: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 40px;
    position: relative;
    overflow: hidden;
  }

  .launch-btn:hover {
    background: #fff;
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(200,255,0,0.3);
  }

  .launch-btn:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Loading */
  .loader {
    display: none;
    text-align: center;
    padding: 60px 20px;
  }

  .loader.active { display: block; }

  .loader-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .loader-bar::after {
    content: '';
    display: block;
    height: 100%;
    width: 40%;
    background: var(--accent);
    animation: slide 1.2s ease-in-out infinite;
  }

  @keyframes slide {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  .loader-text {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Results */
  .results { display: none; }
  .results.active { display: block; }

  .results-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 30px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .results-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 700;
  }

  .results-header span {
    font-size: 11px;
    color: var(--muted);
  }

  /* Niche cards */
  .niche-grid {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 40px;
  }

  .niche-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.5s forwards;
  }

  .niche-card:nth-child(1) { animation-delay: 0.05s; }
  .niche-card:nth-child(2) { animation-delay: 0.1s; }
  .niche-card:nth-child(3) { animation-delay: 0.15s; }
  .niche-card:nth-child(4) { animation-delay: 0.2s; }
  .niche-card:nth-child(5) { animation-delay: 0.25s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .niche-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s;
    transform-origin: bottom;
  }

  .niche-card:hover {
    border-color: #333;
    background: #161616;
  }

  .niche-card:hover::before { transform: scaleY(1); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
    gap: 16px;
  }

  .niche-rank {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .niche-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    flex: 1;
  }

  .score-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border: 1px solid;
    flex-shrink: 0;
  }

  .score-hot { border-color: var(--accent2); color: var(--accent2); background: rgba(255,107,53,0.08); }
  .score-good { border-color: var(--accent); color: var(--accent); background: rgba(200,255,0,0.06); }
  .score-medium { border-color: var(--muted); color: var(--muted); }

  .niche-desc {
    font-size: 12px;
    color: #999;
    line-height: 1.8;
    margin-bottom: 16px;
  }

  .metrics {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .metric {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .metric-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .metric-value {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }

  .metric-value.green { color: var(--accent); }
  .metric-value.orange { color: var(--accent2); }

  /* Expanded detail */
  .niche-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .niche-card.expanded .niche-detail {
    max-height: 600px;
  }

  .detail-inner {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .detail-section {
    margin-bottom: 16px;
  }

  .detail-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .detail-text {
    font-size: 12px;
    color: #aaa;
    line-height: 1.9;
  }

  .product-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .product-tag {
    font-size: 10px;
    padding: 4px 10px;
    background: rgba(200,255,0,0.06);
    border: 1px solid rgba(200,255,0,0.15);
    color: #ccc;
    letter-spacing: 1px;
  }

  /* Regen */
  .regen-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 2px;
    width: 100%;
    text-transform: uppercase;
  }

  .regen-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Error */
  .error {
    display: none;
    padding: 20px;
    border: 1px solid #ff4444;
    color: #ff4444;
    font-size: 12px;
    line-height: 1.8;
    margin-bottom: 20px;
  }
  .error.active { display: block; }

  /* Expand hint */
  .expand-hint {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-align: right;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">// Ghost Operator — Module 01</div>
    <h1>NICHE<span>FINDER</span></h1>
    <p class="subtitle">
      Analyse IA des meilleures niches dropshipping 2026<br>
      Tendances, marges, concurrence, produits — en temps réel.
    </p>
  </header>

  <div class="filters">
    <div class="filter-label">// Filtres de recherche</div>
    <button class="filter-btn active" data-filter="budget">Budget zéro</button>
    <button class="filter-btn active" data-filter="automatisable">Automatisable IA</button>
    <button class="filter-btn" data-filter="tiktok">Viral TikTok</button>
    <button class="filter-btn" data-filter="marge">Haute marge</button>
    <button class="filter-btn" data-filter="evergreen">Evergreen</button>
    <button class="filter-btn" data-filter="tendance">Tendance 2026</button>
  </div>

  <button class="launch-btn" id="launchBtn" onclick="analyzeNiches()">
    ⚡ ANALYSER LES NICHES
  </button>

  <div class="error" id="errorBox"></div>

  <div class="loader" id="loader">
    <div class="loader-bar"></div>
    <div class="loader-text" id="loaderText">INITIALISATION DE L'ANALYSE...</div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <h2>TOP 5 NICHES</h2>
      <span id="resultsSubtitle">— analyse générée par IA</span>
    </div>
    <div class="niche-grid" id="nicheGrid"></div>
    <button class="regen-btn" onclick="analyzeNiches()">↻ REGÉNÉRER UNE NOUVELLE ANALYSE</button>
  </div>
</div>

<script>
const loaderMessages = [
  "SCAN DES TENDANCES ALIEXPRESS...",
  "ANALYSE DE LA CONCURRENCE...",
  "CALCUL DES MARGES POTENTIELLES...",
  "ÉVALUATION VIRALITÉ TIKTOK...",
  "GÉNÉRATION DU RAPPORT STRATÉGIQUE...",
];

let loaderInterval;

function getActiveFilters() {
  return [...document.querySelectorAll('.filter-btn.active')]
    .map(b => b.dataset.filter);
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => btn.classList.toggle('active'));
});

async function analyzeNiches() {
  const btn = document.getElementById('launchBtn');
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');
  const errorBox = document.getElementById('errorBox');
  const loaderText = document.getElementById('loaderText');

  btn.disabled = true;
  loader.classList.add('active');
  results.classList.remove('active');
  errorBox.classList.remove('active');

  let msgIdx = 0;
  loaderInterval = setInterval(() => {
    loaderText.textContent = loaderMessages[msgIdx % loaderMessages.length];
    msgIdx++;
  }, 1400);

  const filters = getActiveFilters();
  const filterStr = filters.length
    ? `Critères prioritaires : ${filters.join(', ')}.`
    : 'Aucun filtre spécifique.';

  const prompt = `Expert dropshipping 2026. ${filterStr} Budget zéro, automatisation IA, croissance exponentielle.

Réponds UNIQUEMENT en JSON valide, sans texte avant/après, sans backticks. Sois TRÈS concis dans chaque champ (max 1 phrase par champ texte).

{"niches":[{"rank":1,"nom":"...","score":"HOT","description":"...","margeMin":"25%","margeMax":"60%","concurrence":"Faible","tendance":"↑↑↑","budgetDepart":"0€","produits":["p1","p2","p3"],"strategie":"...","iaAutomatisation":"...","risque":"..."},{"rank":2,"nom":"...","score":"GOOD","description":"...","margeMin":"20%","margeMax":"50%","concurrence":"Moyenne","tendance":"↑↑","budgetDepart":"0€","produits":["p1","p2","p3"],"strategie":"...","iaAutomatisation":"...","risque":"..."},{"rank":3,"nom":"...","score":"RISING","description":"...","margeMin":"30%","margeMax":"70%","concurrence":"Faible","tendance":"↑↑↑","budgetDepart":"0€","produits":["p1","p2","p3"],"strategie":"...","iaAutomatisation":"...","risque":"..."},{"rank":4,"nom":"...","score":"GOOD","description":"...","margeMin":"20%","margeMax":"55%","concurrence":"Moyenne","tendance":"↑↑","budgetDepart":"<50€","produits":["p1","p2","p3"],"strategie":"...","iaAutomatisation":"...","risque":"..."},{"rank":5,"nom":"...","score":"GOOD","description":"...","margeMin":"15%","margeMax":"45%","concurrence":"Forte","tendance":"→","budgetDepart":"0€","produits":["p1","p2","p3"],"strategie":"...","iaAutomatisation":"...","risque":"..."}],"conseil_global":"..."}`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 2000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    clearInterval(loaderInterval);

    if (!response.ok || !data.content) throw new Error(data.error?.message || 'API error');

    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    renderResults(parsed);
  } catch (err) {
    clearInterval(loaderInterval);
    loader.classList.remove('active');
    btn.disabled = false;
    errorBox.textContent = `Erreur : ${err.message}. Réessayez.`;
    errorBox.classList.add('active');
  }
}

function scoreClass(score) {
  if (score.includes('HOT')) return 'score-hot';
  if (score.includes('GOOD')) return 'score-good';
  return 'score-medium';
}

function renderResults(data) {
  const loader = document.getElementById('loader');
  const results = document.getElementById('results');
  const grid = document.getElementById('nicheGrid');
  const btn = document.getElementById('launchBtn');
  const subtitle = document.getElementById('resultsSubtitle');

  loader.classList.remove('active');
  btn.disabled = false;

  if (data.conseil_global) {
    subtitle.textContent = `— ${data.conseil_global}`;
  }

  grid.innerHTML = '';

  data.niches.forEach((niche, i) => {
    const card = document.createElement('div');
    card.className = 'niche-card';
    card.innerHTML = `
      <div class="card-top">
        <div class="niche-rank">#${niche.rank}</div>
        <div class="niche-name">${niche.nom}</div>
        <div class="score-badge ${scoreClass(niche.score)}">${niche.score}</div>
      </div>
      <div class="niche-desc">${niche.description}</div>
      <div class="metrics">
        <div class="metric">
          <span class="metric-label">Marge</span>
          <span class="metric-value green">${niche.margeMin} – ${niche.margeMax}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Concurrence</span>
          <span class="metric-value ${niche.concurrence === 'Faible' ? 'green' : niche.concurrence === 'Forte' ? 'orange' : ''}">${niche.concurrence}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Tendance</span>
          <span class="metric-value green">${niche.tendance}</span>
        </div>
        <div class="metric">
          <span class="metric-label">Budget départ</span>
          <span class="metric-value">${niche.budgetDepart}</span>
        </div>
      </div>
      <div class="expand-hint">↓ CLIQUER POUR DÉTAILS</div>
      <div class="niche-detail">
        <div class="detail-inner">
          <div class="detail-section">
            <div class="detail-title">// Produits à tester</div>
            <div class="product-list">
              ${niche.produits.map(p => `<span class="product-tag">${p}</span>`).join('')}
            </div>
          </div>
          <div class="detail-section">
            <div class="detail-title">// Stratégie de lancement</div>
            <div class="detail-text">${niche.strategie}</div>
          </div>
          <div class="detail-section">
            <div class="detail-title">// Automatisation IA</div>
            <div class="detail-text">${niche.iaAutomatisation}</div>
          </div>
          <div class="detail-section">
            <div class="detail-title">// Risque principal</div>
            <div class="detail-text" style="color:#ff6b35">${niche.risque}</div>
          </div>
        </div>
      </div>
    `;

    card.addEventListener('click', () => {
      const isExpanded = card.classList.contains('expanded');
      document.querySelectorAll('.niche-card').forEach(c => c.classList.remove('expanded'));
      if (!isExpanded) card.classList.add('expanded');
    });

    grid.appendChild(card);
  });

  results.classList.add('active');
}
</script>
</body>
</html>
