<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Explorer — Ghost Operator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;700&display=swap');
  :root {
    --bg:#080808;--surface:#111;--surface2:#161616;--border:#1e1e1e;--border2:#2a2a2a;
    --accent:#c8ff00;--accent2:#ff6b35;--accent3:#00d4ff;--accent4:#bf5fff;
    --text:#efefef;--muted:#555;--muted2:#888;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(200,255,0,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(200,255,0,0.015) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0;}
  .container{max-width:1000px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1;}
  header{margin-bottom:40px;}
  .tag{font-size:10px;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
  h1{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,64px);font-weight:800;line-height:1;}
  h1 em{color:var(--accent);font-style:normal;display:block;}
  .subtitle{margin-top:12px;font-size:11px;color:var(--muted2);line-height:1.9;}
  .universe-tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:30px;}
  .u-tab{background:var(--surface);border:1px solid var(--border);padding:14px 8px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
  .u-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;transform:scaleX(0);transition:transform 0.2s;}
  .u-tab.active,.u-tab:hover{background:var(--surface2);}
  .u-tab.active::after{transform:scaleX(1);}
  .u-tab[data-u="tech"]::after{background:var(--accent3);}
  .u-tab[data-u="sante"]::after{background:var(--accent);}
  .u-tab[data-u="sport"]::after{background:var(--accent2);}
  .u-tab[data-u="maison"]::after{background:var(--accent4);}
  .u-icon{font-size:22px;display:block;margin-bottom:5px;}
  .u-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2);}
  .niche-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;margin-bottom:20px;}
  .niche-card{background:var(--surface);border:1px solid var(--border);padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;opacity:0;transform:translateY(16px);animation:up 0.4s forwards;}
  @keyframes up{to{opacity:1;transform:translateY(0);}}
  .niche-card:hover{background:var(--surface2);border-color:var(--border2);}
  .niche-card.selected{border-color:var(--accent)!important;background:rgba(200,255,0,0.04);}
  .accent-bar{position:absolute;top:0;left:0;right:0;height:2px;}
  .bar-tech{background:var(--accent3);}.bar-sante{background:var(--accent);}.bar-sport{background:var(--accent2);}.bar-maison{background:var(--accent4);}
  .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px;}
  .card-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;flex:1;line-height:1.2;}
  .card-score{font-size:9px;padding:3px 8px;border:1px solid;white-space:nowrap;flex-shrink:0;}
  .score-hot{border-color:var(--accent2);color:var(--accent2);}
  .score-good{border-color:var(--accent);color:var(--accent);}
  .score-rising{border-color:var(--accent3);color:var(--accent3);}
  .card-desc{font-size:11px;color:var(--muted2);line-height:1.7;margin-bottom:14px;}
  .card-stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px;}
  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat-label{font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
  .stat-val{font-size:12px;font-weight:700;}
  .card-tags{display:flex;flex-wrap:wrap;gap:5px;}
  .card-tag{font-size:9px;padding:3px 7px;background:rgba(255,255,255,0.03);border:1px solid var(--border2);color:var(--muted2);}
  .card-expand{max-height:0;overflow:hidden;transition:max-height 0.35s ease;}
  .niche-card.open .card-expand{max-height:600px;}
  .expand-body{margin-top:16px;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:12px;}
  .ex-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;}
  .ex-text{font-size:11px;color:#aaa;line-height:1.8;}
  .label-tech{color:var(--accent3);}.label-sante{color:var(--accent);}.label-sport{color:var(--accent2);}.label-maison{color:var(--accent4);}
  .approach-badge{display:inline-block;font-size:9px;padding:3px 10px;letter-spacing:1px;margin-top:5px;}
  .approach-marque{background:rgba(200,255,0,0.08);border:1px solid rgba(200,255,0,0.2);color:var(--accent);}
  .approach-test{background:rgba(255,107,53,0.08);border:1px solid rgba(255,107,53,0.2);color:var(--accent2);}
  .approach-both{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);color:var(--accent3);}
  .check{display:none;position:absolute;top:10px;right:10px;font-size:14px;color:var(--accent);}
  .niche-card.selected .check{display:block;}
  .select-hint{font-size:10px;color:var(--muted);letter-spacing:1px;text-align:right;margin-bottom:20px;}
  .compare-bar{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid var(--border2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;transform:translateY(100%);transition:transform 0.3s;z-index:100;}
  .compare-bar.visible{transform:translateY(0);}
  .compare-info{font-size:11px;color:var(--muted2);}
  .compare-info strong{color:var(--accent);font-size:14px;}
  .compare-btn{background:var(--accent);color:#000;border:none;padding:10px 20px;font-family:'Syne',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;cursor:pointer;}
  .clear-btn{background:transparent;border:1px solid var(--border2);color:var(--muted);padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;overflow-y:auto;padding:20px;}
  .modal-overlay.active{display:flex;align-items:flex-start;justify-content:center;}
  .modal{background:var(--surface);border:1px solid var(--border2);max-width:900px;width:100%;margin:auto;padding:28px;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
  .modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
  .modal-close{background:none;border:1px solid var(--border2);color:var(--muted2);padding:6px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;}
  .compare-grid{display:grid;gap:2px;}
  .compare-col{background:var(--surface2);border:1px solid var(--border);padding:18px;}
  .compare-col-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .compare-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);gap:10px;}
  .compare-row:last-child{border-bottom:none;}
  .compare-row-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex-shrink:0;}
  .compare-row-val{font-size:11px;color:var(--text);text-align:right;}
  .back-btn{display:inline-block;margin-bottom:24px;font-size:10px;letter-spacing:2px;color:var(--muted2);text-decoration:none;border:1px solid var(--border2);padding:8px 16px;transition:all 0.2s;}
  .back-btn:hover{color:var(--accent);border-color:var(--accent);}
  @media(max-width:600px){.universe-tabs{grid-template-columns:repeat(2,1fr);}.niche-grid{grid-template-columns:1fr;}}
</style>
</head>

let currentU='tech';
let selectedNiches=[];

function showUniverse(u){
  currentU=u;
  document.querySelectorAll('.u-tab').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.u-tab[data-u="${u}"]`).classList.add('active');
  renderNiches(u);
}

function renderNiches(u){
  const d=DATA[u];
  const grid=document.getElementById('nicheGrid');
  grid.innerHTML='';
  d.niches.forEach((n,i)=>{
    const isSelected=selectedNiches.find(s=>s.nom===n.nom);
    const card=document.createElement('div');
    card.className='niche-card'+(isSelected?' selected':'');
    card.style.animationDelay=(i*0.05+0.04)+'s';
    const sc=n.score==='HOT'?'score-hot':n.score==='GOOD'?'score-good':'score-rising';
    const ap=n.approche==='marque'?'<span class="approach-badge approach-marque">🏷 MARQUE</span>':n.approche==='test'?'<span class="approach-badge approach-test">⚡ TEST RAPIDE</span>':'<span class="approach-badge approach-both">↔ MIXTE</span>';
    card.innerHTML=`<div class="accent-bar ${d.barClass}"></div><span class="check">✓</span><div class="card-header"><div class="card-name">${n.nom}</div><div class="card-score ${sc}">${n.score}</div></div><div class="card-desc">${n.description}</div><div class="card-stats"><div class="stat"><span class="stat-label">Marge</span><span class="stat-val" style="color:${d.color}">${n.margeMin}–${n.margeMax}</span></div><div class="stat"><span class="stat-label">Concurrence</span><span class="stat-val">${n.concurrence}</span></div><div class="stat"><span class="stat-label">Tendance</span><span class="stat-val" style="color:${d.color}">${n.tendance}</span></div><div class="stat"><span class="stat-label">Budget</span><span class="stat-val">${n.budget}</span></div></div><div class="card-tags">${n.produits.map(p=>`<span class="card-tag">${p}</span>`).join('')}</div><div class="card-expand"><div class="expand-body"><div><div class="ex-label ${d.labelClass}">// Stratégie</div><div class="ex-text">${n.strategie}</div></div><div><div class="ex-label ${d.labelClass}">// Automatisation IA</div><div class="ex-text">${n.iaAuto}</div></div><div><div class="ex-label ${d.labelClass}">// Approche</div>${ap}</div><div><div class="ex-label" style="color:#ff6b35">// Risque</div><div class="ex-text" style="color:#ff6b35">${n.risque}</div></div></div></div>`;
    let pt;
    card.addEventListener('mousedown',()=>{pt=setTimeout(()=>toggleSelect(n,u,card),500);});
    card.addEventListener('mouseup',()=>clearTimeout(pt));
    card.addEventListener('touchstart',()=>{pt=setTimeout(()=>toggleSelect(n,u,card),500);},{passive:true});
    card.addEventListener('touchend',()=>clearTimeout(pt));
    card.addEventListener('click',()=>card.classList.toggle('open'));
    grid.appendChild(card);
  });
}

function toggleSelect(n,u,card){
  const idx=selectedNiches.findIndex(s=>s.nom===n.nom);
  if(idx>-1){selectedNiches.splice(idx,1);card.classList.remove('selected');}
  else{if(selectedNiches.length>=4)return;selectedNiches.push({...n,universe:u});card.classList.add('selected');}
  document.getElementById('compareCount').textContent=selectedNiches.length;
  document.getElementById('compareBar').classList.toggle('visible',selectedNiches.length>=2);
}

function clearSelection(){
  selectedNiches=[];
  document.querySelectorAll('.niche-card.selected').forEach(c=>c.classList.remove('selected'));
  document.getElementById('compareCount').textContent=0;
  document.getElementById('compareBar').classList.remove('visible');
}

function openCompare(){
  const grid=document.getElementById('compareGrid');
  grid.style.gridTemplateColumns=`repeat(${selectedNiches.length},1fr)`;
  grid.innerHTML='';
  const fields=[{label:'Score',fn:n=>n.score},{label:'Marge',fn:n=>`${n.margeMin} – ${n.margeMax}`},{label:'Concurrence',fn:n=>n.concurrence},{label:'Tendance',fn:n=>n.tendance},{label:'Budget',fn:n=>n.budget},{label:'Approche',fn:n=>n.approche},{label:'Risque',fn:n=>n.risque}];
  selectedNiches.forEach(n=>{
    const col=document.createElement('div');
    col.className='compare-col';
    const c=DATA[n.universe]?.color||'var(--accent)';
    col.innerHTML=`<div class="compare-col-name" style="color:${c}">${n.nom}</div>`+fields.map(f=>`<div class="compare-row"><span class="compare-row-label">${f.label}</span><span class="compare-row-val">${f.fn(n)}</span></div>`).join('');
    grid.appendChild(col);
  });
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay')){document.getElementById('modalOverlay').classList.remove('active');}
}

showUniverse('tech');
</script>
